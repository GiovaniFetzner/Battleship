spring.application.name=battleship

spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}

# Common configuration
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Comma-separated list. Ex: https://app.example.com,https://www.example.com
app.websocket.allowed-origins=${WEBSOCKET_ALLOWED_ORIGINS:http://localhost:3000}

# Comma-separated list. Ex: https://app.example.com,https://www.example.com
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Observability (Actuator)
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized
management.endpoint.health.show-components=when_authorized
management.endpoint.health.group.liveness.include=livenessState,ping
management.endpoint.health.group.readiness.include=readinessState,ping
management.endpoint.health.group.liveness.additional-path=server:/livez
management.endpoint.health.group.readiness.additional-path=server:/readyz

# Basic metadata for /actuator/info
management.info.env.enabled=true
info.app.name=${spring.application.name}
info.app.environment=${SPRING_PROFILES_ACTIVE:prod}
