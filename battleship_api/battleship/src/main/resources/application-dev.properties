# Dev profile configuration
spring.config.activate.on-profile=dev

# Dev profile uses the full stack (PostgreSQL + Redis) via Docker containers.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/battleship}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Actuator / Health checks
management.endpoint.health.group.readiness.include=readinessState,db,ping

# Redis configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Logging
logging.level.root=INFO