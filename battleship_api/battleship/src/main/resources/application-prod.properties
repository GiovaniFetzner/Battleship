spring.config.activate.on-profile=prod

# Production profile is exclusive to AWS. Keep placeholders until infra is ready.

# Database (AWS RDS PostgreSQL)
spring.datasource.url=${DB_URL:__AWS_RDS_JDBC_URL__}
spring.datasource.username=${DB_USERNAME:__AWS_RDS_USERNAME__}
spring.datasource.password=${DB_PASSWORD:__AWS_RDS_PASSWORD__}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (Hikari)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Logging
logging.level.root=WARN
logging.level.org.hibernate.SQL=OFF

# Redis (AWS ElastiCache)
spring.data.redis.host=${REDIS_HOST:__AWS_ELASTICACHE_REDIS_ENDPOINT__}
spring.data.redis.port=${REDIS_PORT:__AWS_ELASTICACHE_REDIS_PORT__}
spring.data.redis.password=${REDIS_PASSWORD:__AWS_ELASTICACHE_REDIS_PASSWORD_OR_EMPTY__}

# CORS and WebSocket origins (AWS frontend domains)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:__AWS_FRONTEND_ORIGIN__}
app.websocket.allowed-origins=${WEBSOCKET_ALLOWED_ORIGINS:__AWS_FRONTEND_ORIGIN__}

# Production readiness also depends on database availability
management.endpoint.health.group.readiness.include=readinessState,db,ping