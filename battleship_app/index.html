<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <title>Battleship</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>
    <div class="bg-shapes" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <main class="card">
        <h1>Batalha Naval</h1>
        <p class="subtitle">Digite seu nome para entrar no jogo</p>

        <form id="createGameForm">
            <input id="playerName" placeholder="Nome do jogador" />
            <input id="gameId" placeholder="GameId (opcional)" />
            <p class="form-hint">Se tiver GameId, voce entra na sala desse jogo.</p>
            <button id="createGameBtn" type="submit">Entrar</button>
        </form>
        <p id="formStatus" class="form-status" role="status"></p>

        <section class="available-games" aria-labelledby="availableGamesTitle">
            <div class="available-games-header">
                <h2 id="availableGamesTitle">Partidas aguardando jogador</h2>
                <button id="refreshGamesBtn" class="secondary-button" type="button">Atualizar</button>
            </div>
            <p id="availableGamesStatus" class="available-games-status" role="status"></p>
            <ul id="availableGamesList" class="available-games-list"></ul>
        </section>
    </main>

    <section id="joinRoomModal" class="modal modal--hidden" aria-hidden="true" aria-labelledby="joinRoomModalTitle">
        <div class="modal-overlay"></div>
        <div class="modal-container">
            <div class="modal-content">
                <h2 id="joinRoomModalTitle" class="modal-title">Entrar na sala</h2>
                <p id="joinRoomModalGameText" class="modal-message"></p>
                <input id="joinRoomPlayerName" placeholder="Seu nome" />
                <div class="modal-actions">
                    <button id="cancelJoinRoomBtn" class="secondary-button" type="button">Desistir</button>
                    <button id="confirmJoinRoomBtn" class="modal-button" type="button">Entrar</button>
                </div>
            </div>
        </div>
    </section>

    <script src="./js/index.js"></script>
</body>

</html>
