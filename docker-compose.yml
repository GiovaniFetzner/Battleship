services:
  redis:
    image: redis:7-alpine
    container_name: battleship-redis
    ports:
      - "6379:6379"
    networks:
      - battleship-network

  postgres:
    image: postgres:16-alpine
    container_name: battleship-postgres
    environment:
      POSTGRES_DB: battleship
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - battleship-network

  battleship-api:
    build:
      context: ./battleship_api/battleship
      dockerfile: Dockerfile
    container_name: battleship-api
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      DB_URL: jdbc:postgresql://postgres:5432/battleship
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      WEBSOCKET_ALLOWED_ORIGINS: ${WEBSOCKET_ALLOWED_ORIGINS:-http://localhost:3000}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - battleship-network
    restart: unless-stopped

  battleship-frontend:
    build:
      context: ./battleship_app
      dockerfile: Dockerfile
    container_name: battleship-frontend
    ports:
      - "3000:80"
    environment:
      API_UPSTREAM: http://battleship-api:8080
    depends_on:
      battleship-api:
        condition: service_started
    networks:
      - battleship-network
    restart: unless-stopped

volumes:
  postgres_data:


networks:
  battleship-network:
    driver: bridge
