# DEV: Apenas banco de dados e cache
# Execute: docker-compose up -d
# Backend: Executar manualmente em localhost:8080
# Frontend: Executar manualmente em localhost:3000

services:
  redis:
    image: redis:7-alpine
    container_name: battleship-redis
    ports:
      - "6379:6379"
    networks:
      - battleship-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: battleship-postgres
    environment:
      POSTGRES_DB: battleship
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - battleship-network

volumes:
  postgres_data:

networks:
  battleship-network:
    driver: bridge
